services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: aimap
      POSTGRES_USER: aimap
      POSTGRES_PASSWORD: aimap
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aimap -d aimap"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      AGENT_SERVICE_URL: http://agent:8001
    env_file:
      - ./api/.env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./api:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      INTERNAL_API_URL: http://api:8000
    env_file:
      - ./api/.env
    ports:
      - "8001:8001"
    depends_on:
      - api
    volumes:
      - ./agent:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./web/.env.local
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
